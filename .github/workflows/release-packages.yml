# Build GHCR container image + generate packaging reference assets on tagged releases.
# Kevin owns the image. Packaging assets are reference material, not canonical.
name: Release Packaging

on:
  release:
    types: [published]

permissions:
  contents: write
  packages: write          # push to GHCR

env:
  DEEPSEA_VERSION: ${{ github.event.release.tag_name }}
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/deepsea-dashboard

jobs:
  # ── Docker Image (GHCR) ─────────────────────────────────
  docker:
    name: Build & Push Container Image
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern=v{{version}}
            type=raw,value=latest

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ── Packaging Reference Assets ───────────────────────────
  packaging-assets:
    name: Packaging Reference Assets
    needs: docker
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build reference assets
        run: |
          mkdir -p dist
          VERSION="${DEEPSEA_VERSION#v}"
          DIGEST="${{ needs.docker.outputs.digest }}"

          # Umbrel reference docker-compose
          cat > dist/umbrel-docker-compose.yml <<EOF
          version: "3.7"
          services:
            app_proxy:
              environment:
                APP_HOST: deepsea_deepsea_1
                APP_PORT: 8000

            deepsea:
              image: ghcr.io/djobleezy/deepsea-dashboard:${VERSION}@${DIGEST}
              user: 1000:1000
              restart: on-failure
              volumes:
                - \${APP_DATA_DIR}/data:/data
                - \${APP_DATA_DIR}/config:/config
              environment:
                - DB_PATH=/data/deepsea.db
                - CONFIG_PATH=/config/config.json
          EOF
          sed -i 's/^          //' dist/umbrel-docker-compose.yml

          # Version + digest reference for packagers
          cat > dist/packaging-info.txt <<EOF
          DeepSea Dashboard ${DEEPSEA_VERSION}
          Image: ghcr.io/djobleezy/deepsea-dashboard:${VERSION}
          Digest: ${DIGEST}
          Platforms: linux/amd64, linux/arm64
          Release: https://github.com/Djobleezy/DeepSea-Dashboard/releases/tag/${DEEPSEA_VERSION}
          EOF
          sed -i 's/^          //' dist/packaging-info.txt

      - name: Upload packaging assets
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/umbrel-docker-compose.yml
            dist/packaging-info.txt
