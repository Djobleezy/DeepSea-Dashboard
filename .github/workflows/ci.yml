name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Backend ─────────────────────────────────────────────────────────
  backend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: backend/requirements.txt
      - name: Install v2 backend dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r backend/requirements.txt
      - name: Ruff (v2 backend)
        run: ruff check backend/
      - name: Tests (v2 backend)
        env:
          PYTHONPATH: backend
        run: pytest backend/ -q

  # ── v2 frontend ─────────────────────────────────────────────────────
  frontend:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - name: Install frontend dependencies
        working-directory: frontend
        run: npm ci
      - name: Lint frontend
        working-directory: frontend
        run: npm run lint
      - name: TypeScript check
        working-directory: frontend
        run: npx tsc --noEmit
      - name: Test frontend
        working-directory: frontend
        run: npm test -- --passWithNoTests
      - name: Build frontend
        working-directory: frontend
        run: npm run build

  # ── Security checks ─────────────────────────────────────────────────
  security:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install audit tooling
        run: |
          python -m pip install --upgrade pip
          pip install pip-audit
      - name: Python dependency audit
        run: pip-audit -r backend/requirements.txt
      - name: Frontend dependency audit
        working-directory: frontend
        run: npm audit --audit-level=high

  # ── Docker build ────────────────────────────────────────────────────
  docker:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build Docker image (cached)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./Dockerfile
          tags: deepsea-dashboard:test
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Verify container starts
        run: |
          docker run -d --name test-app -p 8000:8000 deepsea-dashboard:test
          sleep 10
          curl -f http://localhost:8000/api/health || (docker logs test-app && exit 1)
          docker stop test-app
